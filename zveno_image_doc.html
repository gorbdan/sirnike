...]`)\\n- Настройки выбора провайдера (`provider`)\\n\\nМодель указывается в формате `vendor/model` (например, `openai/gpt-4o`, `anthropic/claude-sonnet-4-20250514`).\\n\\nАутентификация: `Authorization: Bearer \u003capi-key\u003e`.\",\"icon\":\"$undefined\",\"url\":\"/docs/api-reference/responses\",\"$ref\":{\"file\":\"api-reference/responses.mdx\"}},{\"$id\":\"api-reference/messages.mdx\",\"type\":\"page\",\"name\":\"$L20\",\"description\":\"Создает запрос к LLM-модели через Anthropic Messages API.\\nСовместим с Anthropic SDK и Claude Code — можно использовать любой Anthropic SDK,\\nуказав `base_url: \\\"https://api.zveno.ai\\\"`.\\n\\nПоддерживает:\\n- Обычный и streaming (`stream: true`) режимы\\n- Tool use (function calling)\\n- Vision (изображения в сообщениях)\\n- Extended thinking\\n- Prompt caching (`cache_control`)\\n- Computer use tools\\n- Автоматический failover между провайдерами\\n\\nМодель указывается в формате `vendor/model` (например, `anthropic/claude-sonnet-4-20250514`).\\n\\nАутентификация: `Authorization: Bearer \u003capi-key\u003e` или `x-api-key: \u003capi-key\u003e`.\\nЗаголовок `x-api-key` автоматически нормализуется для совместимости\\nс Claude Code и Anthropic SDK.\\n\\nТело запроса проксируется к провайдеру без конвертации формата,\\nединственное преобразование — замена поля `model` на provider-specific ID.\\n\\nОшибки возвращаются в формате Anthropic:\\n`{\\\"type\\\": \\\"error\\\", \\\"error\\\": {\\\"type\\\": \\\"\u003cerror_type\u003e\\\", \\\"message\\\": \\\"\u003cmessage\u003e\\\"}}`.\",\"icon\":\"$undefined\",\"url\":\"/docs/api-reference/messages\",\"$ref\":{\"file\":\"api-reference/messages.mdx\"}},{\"$id\":\"api-reference/models.mdx\",\"type\":\"page\",\"name\":\"$L21\",\"description\":\"Возвращает список доступных LLM-моделей в формате, совместимом с OpenAI Models API.\\nАвторизация не требуется.\\n\\nПоддерживает:\\n- Поиск по названию, вендору и описанию (`search`)\\n- Фильтрацию по типу модели (`model_type`: chat, audio_transcription)\\n- Гибкую сортировку (по цене, контексту, рейтингу и др.)\\n- Пагинацию\\n\\nКаждая модель содержит информацию о вендоре, контекстном окне,\\nподдерживаемых модальностях, ценах и возможностях (tool use, vision, streaming и др.).\",\"icon\":\"$undefined\",\"url\":\"/docs/api-reference/models\",\"$ref\":{\"file\":\"api-reference/models.mdx\"}},{\"$id\":\"api-reference/model-providers.mdx\",\"type\":\"page\",\"name\":\"$L22\",\"description\":\"Возвращает список провайдеров для конкретной модели с информацией\\nо ценах, поддерживаемых возможностях (streaming, tool use) и статусе.\\n\\nПуть: `/v1/models/{vendor}/{model}/providers`\\n(например, `/v1/models/anthropic/claude-sonnet-4-20250514/providers`).\",\"icon\":\"$undefined\",\"url\":\"/docs/api-reference/model-providers\",\"$ref\":{\"file\":\"api-reference/model-providers.mdx\"}},{\"$id\":\"api-reference/embeddings.mdx\",\"type\":\"page\",\"name\":\"$L23\",\"description\":\"Генерирует векторные представления (embeddings) для текста.\\nСовместим с OpenAI Embeddings API — можно использовать любой OpenAI SDK,\\nуказав `base_url: \\\"https://api.zveno.ai/v1\\\"`.\\n\\nПоддерживает:\\n- Единичный и batch input (строка или массив строк)\\n- Выбор формата (float, base64)\\n- Настройки выбора провайдера (`provider`)\\n\\nМодель указывается в формате `vendor/model` (например, `openai/text-embedding-3-small`).\\n\\nАутентификация: `Authorization: Bearer \u003capi-key\u003e`.\",\"icon\":\"$undefined\",\"url\":\"/docs/api-reference/embeddings\",\"$ref\":{\"file\":\"api-reference/embeddings.mdx\"}},{\"$id\":\"api-reference/embedding-models.mdx\",\"type\":\"page\",\"name\":\"$L24\",\"description\":\"Возвращает список доступных embedding моделей с информацией\\nо размерности, ценах и поддерживаемых возможностях.\\n\\nАвторизация не требуется.\",\"icon\":\"$undefined\",\"url\":\"/docs/api-reference/embedding-models\",\"$ref\":{\"file\":\"api-reference/embedding-models.mdx\"}},{\"$id\":\"api-reference/audio-transcriptions.mdx\",\"type\":\"page\",\"name\":\"$L25\",\"description\":\"Транскрибирует аудиофайл в текст.\\nСовместим с OpenAI Audio Transcriptions API — можно использовать любой OpenAI SDK,\\nуказав `base_url: \\\"https://api.zveno.ai/v1\\\"`.\\n\\nОграничение на размер файла: **25 MB**.\\n\\nПоддерживаемые форматы входного аудио: `mp3`, `mp4`, `mpeg`, `mpga`, `m4a`, `wav`, `webm`.\\n\\nФормат ответа (`response_format`) зависит от модели:\\n- `openai/whisper-1` — `json`, `text`, `srt`, `verbose_json`, `vtt`\\n- `openai/gpt-4o-transcribe`, `openai/gpt-4o-mini-transcribe` — `json`, `text`\\n- `openai/gpt-4o-transcribe-diarize` — `json`, `text`, `diarized_json` (с сегментами по говорящим)\\n\\nРеференсные аудио-сэмплы говорящих (`known_speaker_references`) передаются как data URLs\\nи принимают те же форматы, что и входной файл.\\n\\nМодель указывается в формате `vendor/model` (например, `openai/whisper-1`).\\n\\nАутентификация: `Authorization: Bearer \u003capi-key\u003e`.\",\"icon\":\"$undefined\",\"url\":\"/docs/api-reference/audio-transcriptions\",\"$ref\":{\"file\":\"api-reference/audio-transcriptions.mdx\"}},{\"$id\":\"api-reference/moderations.mdx\",\"type\":\"page\",\"name\":\"$L26\",\"description\":\"Модерация контента\",\"icon\":\"$undefined\",\"url\":\"/docs/api-reference/moderations\",\"$ref\":{\"file\":\"api-reference/moderations.mdx\"}},{\"$id\":\"api-reference/videos-create.mdx\",\"type\":\"page\",\"name\":\"$L27\",\"description\":\"Отправляет асинхронный запрос на генерацию видео. Status codes exact mirror OR POST /videos: 202, 400, 401, 402, 404, 429, 500\",\"icon\":\"$undefined\",\"url\":\"/docs/api-reference/videos-create\",\"$ref\":{\"file\":\"api-reference/videos-create.mdx\"}},{\"$id\":\"api-reference/videos-status.mdx\",\"type\":\"page\",\"name\":\"$L28\",\"description\":\"Возвращает текущий статус и результат задачи видеогенерации. Status codes mirror OR GET /videos/{jobId}: 200, 401, 404, 500\",\"icon\":\"$undefined\",\"url\":\"/docs/api-reference/vid
